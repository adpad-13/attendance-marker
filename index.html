<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Attendance System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#edf3fb;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.container{max-width:520px;width:100%;background:#fff;border-radius:18px;padding:30px;box-shadow:0 15px 35px rgba(0,0,0,.08)}
h1{text-align:center;color:#2563eb;margin-bottom:8px}
.subtitle{text-align:center;color:#666;margin-bottom:18px}
#status{text-align:center;font-weight:bold;color:#2563eb;margin-bottom:18px}
.upload-btn{display:block;width:100%;padding:14px;background:#2563eb;color:#fff;border-radius:10px;text-align:center;cursor:pointer}
.upload-btn:hover{background:#1d4ed8}
input[type=file]{display:none}
.preview{margin-top:20px;border:2px dashed #cbd5e1;border-radius:12px;height:300px;display:flex;align-items:center;justify-content:center;background:#f8fafc;overflow:hidden}
.preview img{display:none;width:100%;height:100%;object-fit:cover}
#placeholder{color:#888}
button{margin-top:20px;width:100%;padding:14px;border:none;border-radius:10px;background:#16a34a;color:#fff;font-size:16px;cursor:pointer}
button:disabled{background:#bbb;cursor:not-allowed}
.result{display:none;margin-top:20px;padding:18px;border-radius:12px;text-align:center}
.success{background:#dcfce7;border-left:6px solid #16a34a}
.fail{background:#fee2e2;border-left:6px solid #dc2626}
.name{font-size:28px;color:#2563eb;font-weight:bold;margin:8px 0}
</style>
</head>
<body>
<div class="container">
<h1>AI Attendance System</h1>
<p class="subtitle">Upload a student's photo to mark attendance</p>
<p id="status">Loading AI Model...</p>

<label class="upload-btn" for="image-upload">📷 Upload Student Image</label>
<input id="image-upload" type="file" accept="image/*" disabled>

<div class="preview">
<span id="placeholder">No image selected</span>
<img id="image-preview">
</div>

<button id="predict-btn" disabled>Mark Attendance</button>

<div id="attendance-result" class="result"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
const URL="https://teachablemachine.withgoogle.com/models/gDP_0CMKW/";
let model;

const statusEl=document.getElementById("status");
const upload=document.getElementById("image-upload");
const preview=document.getElementById("image-preview");
const placeholder=document.getElementById("placeholder");
const predictBtn=document.getElementById("predict-btn");
const result=document.getElementById("attendance-result");

async function init(){
 try{
   model=await tmImage.load(URL+"model.json",URL+"metadata.json");
   statusEl.textContent="✅ Model Loaded Successfully";
   statusEl.style.color="#16a34a";
   upload.disabled=false;
   setTimeout(()=>statusEl.style.display="none",2000);
 }catch(e){
   console.error(e);
   statusEl.textContent="❌ Failed to load AI Model";
   statusEl.style.color="#dc2626";
 }
}

upload.addEventListener("change",e=>{
 const file=e.target.files[0];
 if(!file) return;
 const reader=new FileReader();
 reader.onload=ev=>{
   preview.src=ev.target.result;
   preview.style.display="block";
   placeholder.style.display="none";
   predictBtn.disabled=false;
   result.style.display="none";
 };
 reader.readAsDataURL(file);
});

predictBtn.onclick=async()=>{
 const predictions=await model.predict(preview);
 let best=predictions[0];
 predictions.forEach(p=>{if(p.probability>best.probability) best=p;});

 result.style.display="block";
 if(best.probability>0.60 && !["background","unknown"].includes(best.className.toLowerCase())){
   result.className="result success";
   result.innerHTML=`<h2>✅ Attendance Marked</h2><div class="name">${best.className}</div><p>Confidence: ${(best.probability*100).toFixed(2)}%</p>`;
 }else{
   result.className="result fail";
   result.innerHTML=`<h2>❌ Student Not Recognized</h2><div class="name">${best.className}</div><p>Highest Match: ${(best.probability*100).toFixed(2)}%</p>`;
 }
};

window.onload=init;
</script>
</body>
</html>
